# HTTP — Certbot's nginx plugin will add SSL blocks and redirects after you run certbot.
# Replace server_name values if your domain differs.

server {
    listen 80;
    listen [::]:80;
    server_name haranshvir.com www.haranshvir.com;

    root /var/www/haranshvir;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Optional: long cache for static assets (uncomment after go-live if you use hashed filenames)
    # location ~* \.(css|js|svg|ico|woff2?)$ {
    #     expires 7d;
    #     add_header Cache-Control "public, immutable";
    # }
}
